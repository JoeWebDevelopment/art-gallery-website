<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32x32.png">
  <link rel="stylesheet" href="styles.css">
  
  <title>Frontend Mentor | Art gallery website</title>
</head>
<body>

  <main>
    <div class="container">
      <section class="hero">
        <div class="hero-background-container">
          <div class="blackbox"></div>
          <picture>
            <source
    media="(max-width: 716px)"
    srcset="assets/mobile/image-hero@2x.jpg"
  >
            <img src="assets/desktop/image-hero@2x.jpg" alt="A photo of two individuals looking at a picture in a art gallery" class="hero-image">
          </picture>
          <div class="hero-content">
            <h1>Modern <br> Art Gallery</h1>

            <div class="hero-text-container">
              <p class="hero-text">
                The arts in the collection of the Modern Art Gallery all started from a spark of inspiration. Will these pieces inspire you? Visit us and find out.
              </p>
              <a href="location.html" class="btn-link">
                <span>Our Location</span>
                <img src="assets/icon-arrow-right.svg" alt="an arrow pointing right" class="arrow-right">
              </a>
            </div>
          </div>

          
        </div>

      </section>
    </div>

  </main>


  
</body>
</html>
